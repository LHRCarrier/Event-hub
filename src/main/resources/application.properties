# Database Configuration
jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3305/eventhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
jdbc.username=root
jdbc.password=root

# JWT Configuration
jwt.secret=eventhub_secret_key_2026_must_be_at_least_256_bits_long_for_hs256_algorithm
jwt.expiration=7200000

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.eventhub.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# Spring Configuration
spring.profiles.active=development
server.port=8080