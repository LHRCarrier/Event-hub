<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Community Event Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#home" onclick="showPage('home')">
                <i class="fas fa-calendar-alt text-primary"></i> EventHub
            </a>
            <div class="d-flex align-items-center">
                <div class="input-group me-3" style="width: 300px;">
                    <input type="text" class="form-control" placeholder="Search events..." id="searchInput">
                    <button class="btn btn-outline-primary" type="button" onclick="searchEvents()">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                        <img id="headerAvatar" src="" alt="Avatar" class="rounded-circle me-2" style="width: 32px; height: 32px; object-fit: cover; display: none;">
                        <span id="headerAvatarInitial" class="rounded-circle bg-primary text-white d-flex align-items-center justify-center me-2" style="width: 32px; height: 32px;">U</span>
                        <span id="currentUsername">Admin</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#profile" onclick="showPage('profile')">Profile</a></li>
                        <li><a class="dropdown-item" href="#settings">Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="handleLogout()">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="row g-0">
        <div class="col-2 sidebar p-0">
            <div class="p-4 border-bottom border-white/10">
                <h4 class="text-center font-bold">EventHub</h4>
            </div>
            <nav class="nav flex-column p-2">
                <a class="nav-link active" href="#home" onclick="showPage('home'); return false;">
                    <i class="fas fa-home"></i> Home
                </a>
                <a class="nav-link" href="#communities" onclick="showPage('communities'); return false;">
                    <i class="fas fa-users"></i> Communities
                </a>
                <a class="nav-link" href="#events" onclick="showPage('events'); return false;">
                    <i class="fas fa-calendar"></i> Events
                </a>
                <a class="nav-link" href="#registrations" onclick="showPage('registrations'); return false;">
                    <i class="fas fa-file-alt"></i> Registrations
                </a>
                <a class="nav-link" href="#users" onclick="showPage('users'); return false;">
                    <i class="fas fa-users"></i> Users
                </a>
                <a class="nav-link" href="#categories" onclick="showPage('categories'); return false;">
                    <i class="fas fa-tags"></i> Categories
                </a>
                <a class="nav-link" href="#dashboard" onclick="showPage('dashboard'); return false;">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <div class="border-top border-white/10 my-2"></div>
                <a class="nav-link" href="#applications" onclick="showPage('applications'); return false;">
                    <i class="fas fa-file-clipboard"></i> Applications
                </a>
                <a class="nav-link" href="#community-approvals" onclick="showPage('community-approvals'); return false;">
                    <i class="fas fa-check-circle"></i> Approvals
                </a>
                <a class="nav-link" href="#profile" onclick="showPage('profile'); return false;">
                    <i class="fas fa-user-circle"></i> Profile
                </a>
            </nav>
        </div>

        <div class="col-10 content p-4">
            <div id="page-home" class="page-content active"></div>
            <div id="page-home-new" class="page-content"></div>
            <div id="page-communities" class="page-content"></div>
            <div id="page-community-detail" class="page-content"></div>
            <div id="page-create-community" class="page-content"></div>
            <div id="page-community-members" class="page-content"></div>
            <div id="page-community-home" class="page-content"></div>
            <div id="page-community-dashboard" class="page-content"></div>
            <div id="page-events" class="page-content"></div>
            <div id="page-event-detail" class="page-content"></div>
            <div id="page-create-event" class="page-content"></div>
            <div id="page-registrations" class="page-content"></div>
            <div id="page-users" class="page-content"></div>
            <div id="page-categories" class="page-content"></div>
            <div id="page-create-category" class="page-content"></div>
            <div id="page-dashboard" class="page-content"></div>
            <div id="page-applications" class="page-content"></div>
            <div id="page-community-approvals" class="page-content"></div>
            <div id="page-profile" class="page-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
